<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlothFlix — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141414;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{width:100%;max-width:380px;padding:48px 40px;background:rgba(0,0,0,.75);border-radius:8px}
h1{text-align:center;font-size:2rem;letter-spacing:4px;margin-bottom:8px;color:#e50914}
.subtitle{text-align:center;color:#8c8c8c;margin-bottom:32px;font-size:.9rem}
input{width:100%;padding:14px 16px;border:none;border-radius:4px;background:#333;color:#fff;font-size:1rem;margin-bottom:16px;outline:none}
input:focus{background:#454545}
button{width:100%;padding:14px;border:none;border-radius:4px;background:#e50914;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:background .2s}
button:hover{background:#f40612}
.error{color:#e87c03;font-size:.85rem;text-align:center;margin-bottom:12px;display:none}
.hint{text-align:center;color:#8c8c8c;margin-top:24px;font-size:.8rem;line-height:1.5}
.hint a{color:#e50914;text-decoration:none}
</style>
</head>
<body>
<div class="login-box">
  <h1>SLOTHFLIX</h1>
  <p class="subtitle">Enter your access token</p>
  <div class="error" id="err"></div>
  <input type="text" id="token" placeholder="Paste your token here" autofocus spellcheck="false">
  <button onclick="submit()">Login</button>
  <p class="hint">Get a token from <a href="https://t.me/sloth_dl_bot">@sloth_dl_bot</a> on Telegram</p>
</div>
<script>
async function submit(){
  const t=document.getElementById('token').value.trim();
  if(!t)return;
  const err=document.getElementById('err');
  err.style.display='none';
  try{
    const r=await fetch('/api/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});
    const d=await r.json();
    if(d.ok){window.location.href='/';}else{err.textContent=d.error||'Login failed';err.style.display='block';}
  }catch(e){err.textContent='Network error';err.style.display='block';}
}
document.getElementById('token').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
