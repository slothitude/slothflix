<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlothFlix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141414;color:#e5e5e5;font-family:'Segoe UI',Helvetica,Arial,sans-serif;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:12px 40px;background:linear-gradient(180deg,rgba(20,20,20,.95),transparent);transition:background .3s}
.nav.scrolled{background:rgba(20,20,20,.98)}
.logo{font-size:28px;font-weight:900;color:#e50914;letter-spacing:-1px;margin-right:40px}
.nav-tabs{display:flex;gap:0;margin-right:24px}
.nav-tab{padding:6px 16px;font-size:14px;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border .2s}
.nav-tab:hover{color:#fff}
.nav-tab.active{color:#fff;border-bottom-color:#e50914}
.search-box{flex:1;max-width:400px;position:relative}
.search-box input{width:100%;padding:8px 16px 8px 40px;border:1px solid #444;border-radius:4px;background:rgba(0,0,0,.7);color:#fff;font-size:14px;outline:none;transition:border .2s}
.search-box input:focus{border-color:#e50914}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888}
.ip-badge{margin-left:auto;font-size:12px;color:#46d369;padding:4px 12px;border:1px solid #46d36933;border-radius:4px;cursor:pointer}
.ip-badge:hover{background:#46d36922}

/* Hero */
.hero{height:70vh;display:flex;align-items:end;padding:0 40px 60px;background:linear-gradient(0deg,#141414 0%,transparent 50%),linear-gradient(90deg,#141414 60%,transparent),radial-gradient(ellipse at 70% 30%,#1a2a3a 0%,#141414 70%)}
.hero-info{max-width:500px}
.hero-info h1{font-size:48px;font-weight:700;margin-bottom:12px;text-shadow:2px 2px 8px rgba(0,0,0,.8)}
.hero-info p{font-size:16px;color:#aaa;line-height:1.5;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:4px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:background .2s}
.btn-play{background:#e50914;color:#fff}
.btn-play:hover{background:#f40612}
.btn-queue{background:rgba(109,109,110,.7);color:#fff;margin-left:10px}
.btn-queue:hover{background:rgba(109,109,110,.5)}

/* Rows */
.row-section{padding:20px 40px}
.row-title{font-size:20px;font-weight:600;margin-bottom:12px;color:#e5e5e5}
.row-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.row-scroll::-webkit-scrollbar{display:none}
.row-scroll .scroll-btn{position:absolute;top:0;bottom:12px;width:40px;background:rgba(20,20,20,.7);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
.row-wrap{position:relative}

/* Cards */
.card{min-width:180px;max-width:180px;border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;flex-shrink:0}
.card:hover{transform:scale(1.08);z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.card img{width:100%;height:250px;object-fit:cover;background:#222}
.card-title{padding:8px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#1a1a1a}
.card-meta{padding:0 8px 8px;font-size:10px;color:#888;display:flex;justify-content:space-between}
.card .seed-badge{color:#46d369}
.card-placeholder{width:100%;height:250px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);display:flex;align-items:center;justify-content:center;font-size:36px;color:#333}
.card[data-src] img{opacity:0;transition:opacity .3s}
.card img.loaded{opacity:1}

/* Detail Panel */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;top:0;right:-600px;width:600px;max-width:100vw;height:100vh;background:#181818;z-index:201;overflow-y:auto;transition:right .3s;box-shadow:-4px 0 24px rgba(0,0,0,.5)}
.detail-panel.open{right:0}
.detail-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:5}
.detail-poster{width:100%;height:350px;object-fit:cover;background:#222}
.detail-body{padding:24px}
.detail-body h2{font-size:28px;margin-bottom:8px}
.detail-meta{display:flex;gap:16px;margin:12px 0;color:#aaa;font-size:14px}
.detail-meta .green{color:#46d369}
.detail-desc{font-size:14px;color:#ccc;line-height:1.6;margin:16px 0}

/* Episode Picker */
.episode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px}
.ep-card{background:#222;border-radius:4px;padding:12px;cursor:pointer;transition:background .2s;border:2px solid transparent}
.ep-card:hover{background:#2a2a2a}
.ep-card.selected{border-color:#e50914}
.ep-card .ep-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-card .ep-size{font-size:11px;color:#888;margin-top:4px}

/* Stream status */
.stream-bar{position:fixed;bottom:0;left:0;right:0;background:#181818;padding:12px 40px;display:flex;align-items:center;gap:16px;z-index:150;transform:translateY(100%);transition:transform .3s}
.stream-bar.open{transform:translateY(0)}
.stream-bar .progress{flex:1;height:4px;background:#333;border-radius:2px;overflow:hidden}
.stream-bar .progress-fill{height:100%;background:#e50914;transition:width .5s}
.stream-bar .speed{color:#46d369;font-size:13px;min-width:100px}
.stream-bar .seeds{color:#aaa;font-size:13px}
.stream-bar .btn-stop{background:#333;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px}

/* Splash Screen */
.splash{position:fixed;top:0;left:0;right:0;bottom:0;background:#141414;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .6s}
.splash.fade-out{opacity:0;pointer-events:none}
.splash img{width:220px;animation:splashPulse 2s ease-in-out infinite}
.splash .splash-sub{color:#666;font-size:14px;letter-spacing:2px}
@keyframes splashPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

/* Video Player Overlay */
.player-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
.player-overlay.open{display:flex}
.player-overlay video{width:100%;height:100%;object-fit:contain}
.player-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:36px;cursor:pointer;z-index:301;opacity:.7;transition:opacity .2s}
.player-close:hover{opacity:1}
.trailer-iframe{position:absolute;top:0;left:0;width:100%;height:100%;z-index:302;transition:opacity .8s}
.trailer-iframe.fade-out{opacity:0;pointer-events:none}
.player-loading{position:absolute;z-index:303;display:flex;flex-direction:column;align-items:center;gap:16px;color:#ccc;font-size:16px;pointer-events:none}
.player-loading.hidden{display:none}
.dl-stats{display:flex;gap:28px;margin-top:8px;font-size:14px}
.dl-stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.dl-val{font-size:22px;font-weight:700;color:#e5e5e5}
.dl-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
.dl-progress-wrap{width:320px;margin-top:8px}
.dl-progress-bar{width:100%;height:4px;background:#333;border-radius:2px;overflow:hidden}
.dl-progress-bar .fill{height:100%;background:#e50914;transition:width .5s;width:0}
.dl-pct{text-align:center;font-size:13px;color:#888;margin-top:6px}

/* Spinner */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #444;border-top-color:#e50914;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Play Ready Overlay */
.play-ready-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:305;display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;background:rgba(0,0,0,.55)}
.play-btn-big{width:80px;height:80px;border-radius:50%;background:rgba(229,9,20,.85);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;transition:transform .2s,background .2s;animation:pulse 2s ease-in-out infinite}
.play-btn-big:hover{transform:scale(1.1);background:rgba(244,6,18,.95)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.play-ready-title{margin-top:16px;font-size:18px;color:#fff;text-shadow:1px 1px 4px rgba(0,0,0,.8);max-width:500px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Next Episode */
.next-ep-overlay{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:310;background:rgba(0,0,0,.85);border-radius:8px;padding:24px 36px;text-align:center;max-width:400px}
.next-ep-title{font-size:16px;color:#ccc;margin-bottom:12px}
.next-ep-countdown{font-size:24px;font-weight:700;color:#e5e5e5;margin-bottom:16px}
.next-ep-buttons{display:flex;gap:12px;justify-content:center}

/* Game Overlay */
.game-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:300;display:none;align-items:center;justify-content:center}
.game-overlay.open{display:flex}
.game-overlay .game-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:36px;cursor:pointer;z-index:301;opacity:.7;transition:opacity .2s}
.game-overlay .game-close:hover{opacity:1}
#gameContainer{width:100%;height:100%}

/* Game Cards */
.game-card{min-width:180px;max-width:180px;border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;flex-shrink:0;background:#222}
.game-card:hover{transform:scale(1.08);z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.game-card .game-icon{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.game-card .game-title{padding:8px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#1a1a1a}
.game-card .game-meta{padding:0 8px 8px;font-size:10px;color:#888;display:flex;justify-content:space-between;align-items:center}
.game-card .system-badge{background:#e5091433;color:#e50914;padding:1px 6px;border-radius:3px;font-size:9px}

.manage-link{display:inline-block;margin-left:12px;font-size:12px;color:#888;text-decoration:underline;cursor:pointer}
.manage-link:hover{color:#ccc}

/* Vimm Library Browser */
.library-bar{display:flex;align-items:center;gap:12px;padding:0 40px;margin-bottom:8px;flex-wrap:wrap}
.library-bar select,.library-bar button{padding:6px 12px;border-radius:4px;border:1px solid #444;background:#222;color:#fff;font-size:13px;cursor:pointer}
.library-bar select:focus,.library-bar button:focus{outline:none;border-color:#e50914}
.library-bar button{background:#e50914;border-color:#e50914;font-weight:600}
.library-bar button:hover{background:#f40612}
.library-bar button:disabled{opacity:.5;cursor:not-allowed}
.letter-bar{display:flex;gap:2px;padding:0 40px;margin-bottom:12px;flex-wrap:wrap}
.letter-bar span{padding:4px 8px;font-size:12px;color:#888;cursor:pointer;border-radius:3px;transition:background .2s,color .2s}
.letter-bar span:hover{color:#fff;background:#333}
.letter-bar span.active{color:#fff;background:#e50914}
.vimm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;padding:0 40px 40px}
.vimm-card{background:#222;border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative}
.vimm-card:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.6)}
.vimm-card img{width:100%;height:220px;object-fit:cover;background:#1a1a2e}
.vimm-card .vimm-title{padding:8px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vimm-card .vimm-meta{padding:0 8px 8px;font-size:10px;color:#888;display:flex;justify-content:space-between}
.vimm-card .vimm-rating{color:#46d369}
.vimm-card .dl-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.vimm-card:hover .dl-overlay{display:flex}
.vimm-card .dl-overlay .btn-sm{padding:6px 16px;border-radius:4px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.vimm-card .dl-overlay .btn-dl{background:#e50914;color:#fff}
.vimm-card .dl-overlay .btn-dl:hover{background:#f40612}
.vimm-card .dl-overlay .btn-dl:disabled{opacity:.5;cursor:not-allowed}
.vimm-card .dl-overlay .btn-installed{background:#46d369;color:#000}
.lib-loading{text-align:center;padding:40px;color:#888}
.tab-sub{display:flex;align-items:center;gap:16px;padding:12px 40px 0}
.tab-sub-btn{padding:6px 16px;font-size:13px;color:#aaa;cursor:pointer;border-radius:4px;border:none;background:none;transition:background .2s,color .2s}
.tab-sub-btn:hover{color:#fff}
.tab-sub-btn.active{background:#e50914;color:#fff}

/* Responsive */
@media(max-width:768px){
  .nav{padding:10px 16px}
  .hero{padding:0 16px 40px;height:50vh}
  .hero-info h1{font-size:28px}
  .row-section{padding:16px}
  .card{min-width:140px;max-width:140px}
  .card img{height:200px}
  .detail-panel{width:100vw}
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <img src="/static/sloth_logo.png" alt="SlothFlix">
  <div class="splash-sub">LOADING</div>
</div>

<!-- Nav -->
<nav class="nav" id="nav">
  <div class="logo">SLOTHFLIX</div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-tab="movies" onclick="switchTab('movies')">Movies &amp; TV</div>
    <div class="nav-tab" data-tab="games" onclick="switchTab('games')">Games</div>
  </div>
  <div class="search-box">
    <span class="icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search movies, TV shows..." autocomplete="off">
  </div>
  <div class="ip-badge" id="ipBadge" onclick="checkIP()">VPN: checking...</div>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="hero-info">
    <h1 id="heroTitle">SlothFlix</h1>
    <p id="heroDesc"></p>
    <div>
      <button class="btn btn-play" id="heroPlay" onclick="playHero()">&#9654; Play</button>
      <button class="btn btn-queue" id="heroQueue" onclick="openDetail(currentHero)">More Info</button>
    </div>
  </div>
</section>

<!-- Video Player -->
<div class="player-overlay" id="playerOverlay">
  <button class="player-close" onclick="closePlayer()">&times;</button>
  <div class="trailer-iframe" id="trailerWrapper" style="display:none">
    <div id="trailerContainer"></div>
  </div>
  <video id="videoPlayer" controls autoplay style="position:relative;z-index:1"></video>
  <div class="player-loading" id="playerLoading">
    <img src="/static/sloth_logo.png" alt="" style="width:120px;opacity:.5">
    <div class="spinner" style="width:40px;height:40px"></div>
    <div id="playerStatus">Starting torrent...</div>
    <div class="dl-stats" id="dlStats" style="display:none">
      <div class="dl-stat"><span class="dl-val" id="dlSpeed">--</span><span class="dl-label">Speed</span></div>
      <div class="dl-stat"><span class="dl-val" id="dlSeeds">--</span><span class="dl-label">Seeds</span></div>
      <div class="dl-stat"><span class="dl-val" id="dlPeers">--</span><span class="dl-label">Peers</span></div>
    </div>
    <div class="dl-progress-wrap" id="dlProgressWrap" style="display:none">
      <div class="dl-progress-bar"><div class="fill" id="dlFill"></div></div>
      <div class="dl-pct" id="dlPct">0%</div>
    </div>
  </div>
  <div class="play-ready-overlay" id="playReadyOverlay" style="display:none" onclick="startPlayback()">
    <div class="play-btn-big">&#9654;</div>
    <div class="play-ready-title" id="playReadyTitle"></div>
  </div>
  <div class="next-ep-overlay" id="nextEpOverlay" style="display:none">
    <div class="next-ep-title" id="nextEpTitle"></div>
    <div class="next-ep-countdown" id="nextEpCountdown"></div>
    <div class="next-ep-buttons">
      <button class="btn btn-play" onclick="playNextEpisode()">Play Now</button>
      <button class="btn btn-queue" onclick="cancelNextEpisode()">Cancel</button>
    </div>
  </div>
</div>

<!-- Catalog rows -->
<div id="catalogRows"></div>

<!-- Game Player Overlay -->
<div class="game-overlay" id="gameOverlay">
  <button class="game-close" onclick="closeGame()">&times;</button>
  <div id="gameContainer"></div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<!-- Stream status bar -->
<div class="stream-bar" id="streamBar">
  <div class="spinner"></div>
  <div class="progress"><div class="progress-fill" id="streamProgress"></div></div>
  <span class="speed" id="streamSpeed">0 MB/s</span>
  <span class="seeds" id="streamSeeds">0 seeds</span>
  <button class="btn-stop" onclick="stopStream()">Stop</button>
</div>

<script>
const API = '';
let currentHero = null;
let streamPollInterval = null;
let trailerPlaylist = [];
let trailerIndex = 0;
let trailerActive = false;
let currentFileList = [];
let currentFileId = null;
let ytPlayer = null;
let ytApiReady = null;
let trailerDone = Promise.resolve();
let trailerDoneResolve = null;
let nextEpisodeTimer = null;

// Auth-aware fetch — Flask injects the credentials the user logged in with
const _authHeader = {{ auth_header | tojson }};

function authFetch(url, opts = {}) {
  if (_authHeader) {
    opts.headers = Object.assign({}, opts.headers || {}, {'Authorization': _authHeader});
    // Avoid credentials-in-URL issues — resolve relative URLs against clean origin
    if (typeof url === 'string' && !url.startsWith('http')) {
      url = location.origin + url;
    }
  }
  return fetch(url, opts);
}

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  loadCatalog();
  checkIP();
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
  });
  document.getElementById('videoPlayer').addEventListener('ended', onVideoEnded);
});

function dismissSplash() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  splash.classList.add('fade-out');
  setTimeout(() => { if (splash.parentNode) splash.remove(); }, 700);
}

// --- IP Check ---
async function checkIP() {
  try {
    const r = await authFetch(API + '/api/ip');
    const d = await r.json();
    document.getElementById('ipBadge').textContent = 'VPN: ' + (d.ip || 'unknown');
  } catch(e) {
    document.getElementById('ipBadge').textContent = 'VPN: error';
  }
}

// --- Catalog ---
async function loadCatalog() {
  const [movies, tv] = await Promise.all([
    authFetch(API + '/api/catalog/movies').then(r => r.json()).catch(() => []),
    authFetch(API + '/api/catalog/tv').then(r => r.json()).catch(() => []),
  ]);
  renderRow('Top Movies', movies);
  renderRow('Top TV Shows', tv);

  // Dismiss splash once catalog loads
  dismissSplash();

  // Set hero to first movie
  if (movies.length) {
    currentHero = movies[0];
    document.getElementById('heroTitle').textContent = currentHero.title;
    loadBlurb(currentHero.title);
  }
}

function renderRow(title, items) {
  if (!items.length) return;
  const container = document.getElementById('catalogRows');
  const section = document.createElement('div');
  section.className = 'row-section';
  section.innerHTML = `<h2 class="row-title">${title}</h2><div class="row-wrap"><div class="row-scroll" id="row-${title.replace(/\s/g,'')}"></div></div>`;
  container.appendChild(section);
  const row = section.querySelector('.row-scroll');
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const posterUrl = `${API}/api/poster/${encodeURIComponent(item.title)}`;
    card.setAttribute('data-src', posterUrl);
    card.innerHTML = `
      <img src="" alt="">
      <div class="card-title" title="${esc(item.title)}">${esc(item.title)}</div>
      <div class="card-meta">
        <span>${item.size || ''}</span>
        <span class="seed-badge">&#9650; ${item.seeders || 0}</span>
      </div>`;
    card.onclick = () => openDetail(item);
    row.appendChild(card);
    posterObserver.observe(card);
  });
}

// --- Lazy poster loading with concurrency limit ---
const MAX_CONCURRENT_POSTERS = 4;
let _posterActive = 0;
const _posterQueue = [];

function _drainPosterQueue() {
  while (_posterActive < MAX_CONCURRENT_POSTERS && _posterQueue.length) {
    const card = _posterQueue.shift();
    _loadPoster(card);
  }
}

function _loadPoster(card) {
  const src = card.getAttribute('data-src');
  if (!src) return;
  card.removeAttribute('data-src');
  _posterActive++;
  const img = card.querySelector('img');
  const tempImg = new Image();
  tempImg.onload = () => {
    img.src = tempImg.src;
    img.classList.add('loaded');
    _posterActive--;
    _drainPosterQueue();
  };
  tempImg.onerror = () => {
    img.src = '/static/poster_default.png';
    img.classList.add('loaded');
    _posterActive--;
    _drainPosterQueue();
  };
  tempImg.src = src;
}

const posterObserver = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (!entry.isIntersecting) continue;
    const card = entry.target;
    posterObserver.unobserve(card);
    _posterQueue.push(card);
  }
  _drainPosterQueue();
}, { rootMargin: '200px' });

const MAX_RETRIES = 3;

async function playItem(item, fileId) {
  closeDetail();
  currentFileId = fileId !== undefined ? fileId : null;

  // Show player overlay with spinner
  const overlay = document.getElementById('playerOverlay');
  const video = document.getElementById('videoPlayer');
  const loading = document.getElementById('playerLoading');
  const status = document.getElementById('playerStatus');
  overlay.classList.add('open');
  loading.classList.remove('hidden');
  status.textContent = 'Starting torrent...';
  video.src = '';

  document.getElementById('streamBar').classList.add('open');
  updateStreamUI('Starting...', 0);

  // Start trailer pre-roll immediately
  startTrailerPreRoll();

  let lastError = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      if (attempt > 1) {
        status.textContent = `Retrying (${attempt}/${MAX_RETRIES})...`;
        // Stop any previous stream before retrying
        try { await authFetch(API + '/api/stream/stop', {method: 'POST'}); } catch(e) {}
        await new Promise(r => setTimeout(r, 2000));
      }

      const body = {magnet: item.magnet};
      if (fileId !== undefined) body.file_id = fileId;

      const r = await authFetch(API + '/api/stream/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const d = await r.json();

      if (d.error) throw new Error(d.error);

      currentSessionId = d.session_id;

      // Start polling status
      if (streamPollInterval) clearInterval(streamPollInterval);
      streamPollInterval = setInterval(pollStatus, 2000);

      // Poll until buffer >= 10%
      status.textContent = attempt > 1 ? `Buffering (attempt ${attempt})...` : 'Buffering...';
      await waitForBuffer(d.session_id);

      // If trailer still playing, show play button overlay and wait
      if (trailerActive) {
        loading.classList.add('hidden');
        document.getElementById('dlStats').style.display = 'none';
        document.getElementById('dlProgressWrap').style.display = 'none';
        showPlayReadyOverlay();
        return;
      }

      startPlayback();
      return; // success
    } catch(e) {
      lastError = e;
      console.warn(`Play attempt ${attempt} failed:`, e.message);
    }
  }

  // All retries exhausted
  status.textContent = `Failed after ${MAX_RETRIES} attempts: ${lastError ? lastError.message : 'unknown error'}`;
  stopTrailerPreRoll();
}

// --- Trailer Pre-Roll (YouTube IFrame Player API) ---
window.addEventListener('message', (e) => {
  if (e.origin === 'https://www.youtube.com') e.stopPropagation();
}, true);
function loadYTApi() {
  if (!ytApiReady) {
    ytApiReady = new Promise(resolve => {
      window.onYouTubeIframeAPIReady = resolve;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      setTimeout(resolve, 10000);
    });
  }
  return ytApiReady;
}

function onTrailerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    if (trailerDoneResolve) { trailerDoneResolve(); trailerDoneResolve = null; }
    // Auto-start playback if play ready overlay is showing
    const playReady = document.getElementById('playReadyOverlay');
    if (playReady.style.display !== 'none') {
      startPlayback();
      return;
    }
    if (trailerActive && trailerIndex + 1 < trailerPlaylist.length) {
      trailerIndex++;
      trailerDone = new Promise(r => { trailerDoneResolve = r; });
      if (ytPlayer) ytPlayer.loadVideoById(trailerPlaylist[trailerIndex].youtube_id);
    }
  }
}

async function startTrailerPreRoll() {
  const wrapper = document.getElementById('trailerWrapper');
  try {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve();
      img.onerror = () => reject(new Error('YouTube unreachable'));
      setTimeout(() => reject(new Error('timeout')), 5000);
      img.src = 'https://www.youtube.com/favicon.ico?' + Date.now();
    });
    const r = await authFetch(API + '/api/trailers');
    trailerPlaylist = await r.json();
  } catch(e) { return; }
  if (!trailerPlaylist.length) return;

  trailerIndex = 0;
  trailerActive = true;
  // Shuffle playlist
  for (let i = trailerPlaylist.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [trailerPlaylist[i], trailerPlaylist[j]] = [trailerPlaylist[j], trailerPlaylist[i]];
  }
  wrapper.style.display = 'block';
  wrapper.classList.remove('fade-out');

  await loadYTApi();

  wrapper.innerHTML = '<div id="trailerContainer"></div>';
  trailerDone = new Promise(r => { trailerDoneResolve = r; });

  if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }

  ytPlayer = new YT.Player('trailerContainer', {
    width: '100%',
    height: '100%',
    videoId: trailerPlaylist[0].youtube_id,
    playerVars: { autoplay: 1, mute: 0, controls: 0, modestbranding: 1, rel: 0 },
    events: {
      onStateChange: onTrailerStateChange,
      onReady: e => { e.target.setVolume(100); e.target.playVideo(); }
    }
  });
}

function fadeOutTrailer() {
  trailerActive = false;
  const wrapper = document.getElementById('trailerWrapper');
  wrapper.classList.add('fade-out');
  setTimeout(() => {
    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }
    wrapper.innerHTML = '<div id="trailerContainer"></div>';
    wrapper.style.display = 'none';
    wrapper.classList.remove('fade-out');
  }, 900);
}

function stopTrailerPreRoll() {
  trailerActive = false;
  if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }
  const wrapper = document.getElementById('trailerWrapper');
  wrapper.innerHTML = '<div id="trailerContainer"></div>';
  wrapper.style.display = 'none';
  if (trailerDoneResolve) { trailerDoneResolve(); trailerDoneResolve = null; }
}

async function waitForBuffer(sessionId, timeoutMs = 120000) {
  const dlStats = document.getElementById('dlStats');
  const dlProgressWrap = document.getElementById('dlProgressWrap');
  dlStats.style.display = 'flex';
  dlProgressWrap.style.display = 'block';
  const deadline = Date.now() + timeoutMs;

  return new Promise((resolve, reject) => {
    const check = async () => {
      try {
        if (Date.now() > deadline) { reject(new Error('Buffering timed out')); return; }
        const r = await authFetch(API + '/api/stream/status');
        const d = await r.json();
        if (!d.active) { reject(new Error('Stream ended unexpectedly')); return; }
        updateStreamUI(null, d.progress, d.download_rate, d.seeds);

        const pct = d.progress || 0;
        document.getElementById('playerStatus').textContent =
          pct >= 10 ? 'Starting playback...' : 'Buffering...';
        document.getElementById('dlFill').style.width = pct + '%';
        document.getElementById('dlPct').textContent = pct.toFixed(1) + '%';
        document.getElementById('dlSpeed').textContent =
          d.download_rate ? (d.download_rate >= 1 ? d.download_rate.toFixed(1) + ' MB/s' : (d.download_rate * 1024).toFixed(0) + ' KB/s') : '--';
        document.getElementById('dlSeeds').textContent = d.seeds || '--';
        document.getElementById('dlPeers').textContent = d.peers || '--';

        if (pct >= 10) {
          resolve();
        } else {
          setTimeout(check, 1500);
        }
      } catch(e) {
        reject(e);
      }
    };
    setTimeout(check, 1000);
  });
}

async function pollStatus() {
  try {
    const r = await authFetch(API + '/api/stream/status');
    const d = await r.json();
    if (!d.active) {
      stopStream();
      return;
    }
    updateStreamUI(null, d.progress, d.download_rate, d.seeds);
  } catch(e) {}
}

function updateStreamUI(msg, progress, speed, seeds) {
  const bar = document.getElementById('streamBar');
  bar.classList.add('open');
  if (progress !== undefined) {
    document.getElementById('streamProgress').style.width = progress + '%';
  }
  if (speed !== undefined) {
    document.getElementById('streamSpeed').textContent = speed.toFixed(1) + ' MB/s';
  }
  if (seeds !== undefined) {
    document.getElementById('streamSeeds').textContent = seeds + ' seeds';
  }
}

async function stopStream() {
  if (streamPollInterval) { clearInterval(streamPollInterval); streamPollInterval = null; }
  try { await authFetch(API + '/api/stream/stop', {method: 'POST'}); } catch(e) {}
  closePlayer();
  document.getElementById('streamBar').classList.remove('open');
}

// --- Next Episode ---
function onVideoEnded() {
  if (!currentFileList.length || currentFileId === null) {
    showEndOverlay(null);
    return;
  }
  const idx = currentFileList.findIndex(f => f.id === currentFileId);
  const next = idx >= 0 && idx + 1 < currentFileList.length ? currentFileList[idx + 1] : null;
  showEndOverlay(next);
}

function showEndOverlay(nextFile) {
  const overlay = document.getElementById('nextEpOverlay');
  const title = document.getElementById('nextEpTitle');
  const countdown = document.getElementById('nextEpCountdown');
  if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }

  // Reset button states
  overlay.querySelector('.btn-play').style.display = '';
  overlay.querySelector('.btn-queue').textContent = 'Cancel';

  if (nextFile) {
    title.textContent = 'Next: ' + nextFile.name;
    let seconds = 5;
    countdown.textContent = 'Playing in ' + seconds + 's...';
    overlay.style.display = 'block';
    nextEpisodeTimer = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(nextEpisodeTimer);
        nextEpisodeTimer = null;
        playNextEpisode();
      } else {
        countdown.textContent = 'Playing in ' + seconds + 's...';
      }
    }, 1000);
  } else {
    title.textContent = '';
    countdown.textContent = '';
    overlay.querySelector('.btn-play').style.display = 'none';
    overlay.querySelector('.btn-queue').textContent = 'Back to Browse';
    overlay.style.display = 'block';
  }
}

function playNextEpisode() {
  if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
  document.getElementById('nextEpOverlay').style.display = 'none';
  const idx = currentFileList.findIndex(f => f.id === currentFileId);
  const next = idx >= 0 && idx + 1 < currentFileList.length ? currentFileList[idx + 1] : null;
  if (next && currentHero) {
    playItem(currentHero, next.id);
  }
}

function cancelNextEpisode() {
  if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
  document.getElementById('nextEpOverlay').style.display = 'none';
  closePlayer();
}

// --- Helpers ---
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;

function fmtSize(bytes) {
  if (!bytes) return '';
  for (const u of ['B','KB','MB','GB','TB']) {
    if (bytes < 1024) return bytes.toFixed(1) + ' ' + u;
    bytes /= 1024;
  }
  return bytes.toFixed(1) + ' PB';
}

async function loadMyRoms() {

  try {
    const r = await authFetch(API + '/api/games');

    content.innerHTML = '';
    const systems = d.systems || {};
    // Build installed roms set for library badges
    installedRoms = {};
    const keys = Object.keys(systems);
    if (!keys.length) {
      content.innerHTML = `<div class="row-section">

      return;
    }
    for (const sys of keys) {
      const info = systems[sys];
      const icon = SYSTEM_ICONS[sys] || '\uD83C\uDFAE';
      installedRoms[sys] = new Set(info.roms.map(r => r.filename.toLowerCase()));
      renderGameRow(`${info.display_name} (${info.count})`, info.roms, sys, icon);
    }

    content.innerHTML = '<div class="row-section"><h2 class="row-title">Error loading games</h2></div>';

    card.innerHTML = `

      <div class="game-meta">

  grid.innerHTML = '<div class="lib-loading">Loading...</div>';
  try {
    const r = await authFetch(`${API}/api/vimm/browse?system=${vimmSystem}&letter=${vimmLetter}`);
    const d = await r.json();
    const games = d.games || [];
    if (!games.length) {
      grid.innerHTML = '<div class="lib-loading">No games found for this letter.</div>';
      return;
    }
    grid.innerHTML = '<div class="vimm-grid" id="vimmGridInner"></div>';
    const inner = document.getElementById('vimmGridInner');
    games.forEach(g => {
      const card = document.createElement('div');
      card.className = 'vimm-card';
      const sysKey = VIMM_TO_SYS[vimmSystem] || vimmSystem.toLowerCase();
      const isInstalled = installedRoms[sysKey] && installedRoms[sysKey].has(g.title.toLowerCase() + '.' + (vimmSystem==='NES'?'nes':vimmSystem==='SNES'?'sfc':'nes'));
      card.innerHTML = `
        <img src="${API}/api/vimm/cover/${g.id}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="vimm-title" title="${esc(g.title)}">${esc(g.title)}</div>
        <div class="vimm-meta">
          <span class="vimm-rating">${g.rating || ''}</span>
          <span>${vimmSystem}</span>
        </div>
        <div class="dl-overlay">
          ${isInstalled ? '<button class="btn-sm btn-installed">Installed</button>' : `<button class="btn-sm btn-dl" onclick="event.stopPropagation();downloadVimmRom(${g.id},'${esc(g.title)}',${g.media_id || 0})">Download</button>`}
        </div>`;
      card.onclick = () => {
        // If installed, launch; otherwise show download overlay
      };
      inner.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = '<div class="lib-loading">Error loading library</div>';
  }
}

async function downloadVimmRom(gameId, title, mediaId) {
  const sysKey = VIMM_TO_SYS[vimmSystem] || vimmSystem.toLowerCase();
  const btn = document.querySelector(`.vimm-card .btn-dl[onclick*="${gameId}"]`);
  if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }
  try {
    const r = await authFetch(`${API}/api/vimm/download/${gameId}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({media_id: mediaId || null, system: sysKey}),
    });
    const d = await r.json();
    if (d.error) {
      if (btn) { btn.disabled = false; btn.textContent = 'Failed'; }
      return;
    }
    // Mark as installed
    if (!installedRoms[sysKey]) installedRoms[sysKey] = new Set();
    installedRoms[sysKey].add(d.filename.toLowerCase());
    if (btn) { btn.textContent = 'Installed'; btn.className = 'btn-sm btn-installed'; btn.disabled = true; }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Error'; }
  }
}

// --- Game Player ---
function launchGame(item) {
  const overlay = document.getElementById('gameOverlay');
  const container = document.getElementById('gameContainer');
  container.innerHTML = '';

  // Set EmulatorJS globals
  window.EJS_player = '#gameContainer';
  window.EJS_core = item.core;
  window.EJS_gameUrl = `${location.origin}/api/games/rom/${encodeURIComponent(item.system)}/${encodeURIComponent(item.filename)}`;
  window.EJS_gameName = item.title;
  window.EJS_backgroundColor = '#000';
  window.EJS_netplayEnabled = true;
  window.EJS_netplayServer = 'wss://netplay.emulatorjs.com';

  // Load EmulatorJS loader
  const script = document.createElement('script');
  script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
  script.onerror = () => {
    container.innerHTML = '<p style="color:#e50914;padding:40px;text-align:center">Failed to load EmulatorJS. Check your internet connection.</p>';
  };
  container.appendChild(script);
  overlay.classList.add('open');
}

function closeGame() {
  const overlay = document.getElementById('gameOverlay');
  const container = document.getElementById('gameContainer');
  container.innerHTML = '';
  overlay.classList.remove('open');
  // Clean up EJS globals
  delete window.EJS_player;
  delete window.EJS_core;
  delete window.EJS_gameUrl;
  delete window.EJS_gameName;
  delete window.EJS_backgroundColor;
  delete window.EJS_netplayEnabled;
  delete window.EJS_netplayServer;
}

// --- Deep-link: ?game=system:filename ---
document.addEventListener('DOMContentLoaded', () => {
  const gameParam = new URLSearchParams(location.search).get('game');
  if (gameParam && gameParam.includes(':')) {
    const idx = gameParam.indexOf(':');
    const system = gameParam.substring(0, idx);
    const filename = gameParam.substring(idx + 1);
    const title = filename.replace(/\.[^.]+$/, '');
    const core = system; // same mapping handled server-side
    switchTab('games');
    // Slight delay to let tab switch settle
    setTimeout(() => {
      launchGame({core, system, filename, title});
    }, 100);
  }
});
</script>
